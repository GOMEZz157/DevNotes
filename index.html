<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevNotes</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Link to JavaScript -->
    <script src="js/scripts.js" defer></script>
    <!-- CDN fontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <h1>DevNotes</h1>
      <div id="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          id="search-input"
          placeholder="Busque por uma nota"
        />
      </div>
      <button id="export-notes">
        Exportar CSV <i class="fa-solid fa-file-export"></i>
      </button>
    </header>
    <div id="add-note-container">
      <input type="text" id="note-content" placeholder="O que deseja anotar?" />
      <button class="add-note"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div id="notes-container"></div>
  </body>
</html>
